<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root{
    --brand:#12508f; --brand2:#0d3d70; --teal:#0e8f88; --ink:#0f1b2d;
    --ink-soft:#3d4a5c; --muted:#6b7787; --bg:#f7f9fc;
  }
  html,body{ width:1200px; height:630px; }
  body{
    font-family:"Pretendard Variable",Pretendard,sans-serif;
    background:
      radial-gradient(70% 90% at 100% 0%, #e7eff8 0%, transparent 55%),
      radial-gradient(60% 80% at 0% 100%, #e0f4f2 0%, transparent 50%),
      #ffffff;
    color:var(--ink); position:relative; overflow:hidden;
    padding:72px 76px; display:flex; flex-direction:column; justify-content:space-between;
  }
  /* 상단 브랜드 */
  .top{ display:flex; align-items:center; gap:14px; }
  .mark{ width:56px; height:56px; }
  .wordmark{ font-size:26px; font-weight:800; letter-spacing:-.02em; }
  .wordmark b{ color:var(--brand); }
  .tag{
    margin-left:auto; font-size:18px; font-weight:700; color:var(--brand);
    background:#e7eff8; padding:9px 18px; border-radius:999px;
  }
  /* 헤드라인 */
  .head{ margin-top:8px; }
  .eyebrow{ font-size:24px; font-weight:700; color:var(--ink-soft); letter-spacing:-.01em; }
  .title{
    margin-top:14px; font-size:78px; line-height:1.05; font-weight:800; letter-spacing:-.03em;
  }
  .title .accent{ color:var(--brand); }
  .sub{ margin-top:22px; font-size:26px; font-weight:500; color:var(--ink-soft); line-height:1.4; max-width:900px; }
  /* 하단 스탯 + 발신 */
  .bottom{ display:flex; align-items:flex-end; justify-content:space-between; }
  .stats{ display:flex; gap:14px; }
  .stat{
    background:#fff; border:1.5px solid #dce3ec; border-radius:16px; padding:16px 22px; min-width:150px;
  }
  .stat .n{ font-size:34px; font-weight:800; letter-spacing:-.02em; }
  .stat .n.sig{ color:var(--brand); } .stat .n.zero{ color:#d1560b; } .stat .n.year{ color:var(--teal); }
  .stat .l{ font-size:16px; color:var(--muted); font-weight:600; margin-top:2px; }
  .org{ text-align:right; }
  .org .who{ font-size:20px; font-weight:800; color:var(--ink); }
  .org .site{ font-size:18px; font-weight:600; color:var(--muted); margin-top:4px; }
</style>
</head>
<body>
  <div class="top">
    <svg class="mark" viewBox="0 0 40 40" fill="none">
      <rect width="40" height="40" rx="10" fill="#12508f"/>
      <path d="M11 27 L20 13 L29 27" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
      <circle cx="11" cy="27" r="3.4" fill="#fff"/>
      <circle cx="20" cy="13" r="3.4" fill="#0e8f88" stroke="#fff" stroke-width="2"/>
      <circle cx="29" cy="27" r="3.4" fill="#fff"/>
    </svg>
    <span class="wordmark">고양은평<b>선</b></span>
    <span class="tag">시민 데이터 플랫폼</span>
  </div>

  <div class="head">
    <div class="eyebrow">감정이 아닌, 데이터로.</div>
    <div class="title">고양은평선<br/><span class="accent">식사·풍동 연장</span></div>
    <div class="sub">식사·풍동 8만 주민의 교통복지와 균형발전을 공공데이터로 증명합니다.</div>
  </div>

  <div class="bottom">
    <div class="stats">
      <div class="stat"><div class="n sig">약 8만</div><div class="l">식사·풍동 주민</div></div>
      <div class="stat"><div class="n zero">0</div><div class="l">식사동 도시철도역</div></div>
      <div class="stat"><div class="n year">2031</div><div class="l">본선 개통 목표</div></div>
    </div>
    <div class="org">
      <div class="who">고양은평선연장 추진모임</div>
      <div class="site">siksaline.kr</div>
    </div>
  </div>
</body>
</html>
